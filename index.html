<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <title>Horoyoel Manual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">

  <style>
    .breadcrumb {
      margin-bottom: 20px;
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    .breadcrumb a {
      color: #42b983;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'Horoyoel Manual',
      repo: '',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      maxLevel: 3
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

  <script>
    function updateBreadcrumb() {

      const oldBreadcrumb = document.querySelector('.breadcrumb');
      if (oldBreadcrumb) {
        oldBreadcrumb.remove();
      }

      const content = document.querySelector('.content article');

      if (!content) {
        return;
      }

      const hash = location.hash.toLowerCase();

      let currentPage = '';

      if (
        hash === '' ||
        hash === '#/' ||
        hash.includes('intro')
      ) {
        currentPage = 'ホーム';
      }
      else if (hash.includes('setup')) {
        currentPage = '導入方法';
      }
      else if (hash.includes('usage')) {
        currentPage = '基本操作';
      }
      else if (hash.includes('modificationguide')) {
        currentPage = '改変ガイド';
      }
      else {
        currentPage = 'ホーム';
      }

      const breadcrumb = document.createElement('div');
      breadcrumb.className = 'breadcrumb';

      if (currentPage === 'ホーム') {
        breadcrumb.innerHTML = '🏠 ホーム';
      } else {
        breadcrumb.innerHTML =
          '<a href="#/">🏠 ホーム</a> &gt; ' +
          currentPage;
      }

      const firstHeading = content.querySelector('h1');

      if (firstHeading) {
        firstHeading.parentNode.insertBefore(
          breadcrumb,
          firstHeading
        );
      } else {
        content.prepend(breadcrumb);
      }
    }

    function waitForDocsify() {
      updateBreadcrumb();

      setTimeout(updateBreadcrumb, 100);
      setTimeout(updateBreadcrumb, 300);
      setTimeout(updateBreadcrumb, 1000);
    }

    window.addEventListener('load', waitForDocsify);
    window.addEventListener('hashchange', waitForDocsify);
  </script>

</body>
</html>
