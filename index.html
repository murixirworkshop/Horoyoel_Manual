<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <title>Horoyoel Manual</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">

  <style>
    .breadcrumb {
      margin-bottom: 20px;
      font-size: 14px;
      color: #888;
    }

    .breadcrumb a {
      color: #42b983;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'Horoyoel Manual',
      repo: '',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      maxLevel: 3,

      plugins: [
        function(hook, vm) {

          hook.afterEach(function(html, next) {

            const route = vm.route.file || '';

            const pageNames = {
              'README.md': 'ホーム',
              'Intro.md': 'ホーム',
              'Setup.md': '導入方法',
              'usage.md': '基本操作',
              'ModificationGuide.md': '改変ガイド'
            };

            let breadcrumb;

            if (
              route === '' ||
              route === 'README.md' ||
              route === 'Intro.md'
            ) {
              breadcrumb =
                '<div class="breadcrumb">🏠 ホーム</div>';
            } else {
              breadcrumb =
                '<div class="breadcrumb">' +
                '<a href="#/">🏠 ホーム</a>' +
                ' &gt; ' +
                (pageNames[route] || route.replace('.md', '')) +
                '</div>';
            }

            next(breadcrumb + html);
          });

        }
      ]
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
